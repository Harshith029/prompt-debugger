name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check (mypy)
        run: mypy

      - name: Version consistency
        run: python tools/check_versions.py

      - name: Schema validation (subset + instances)
        run: python tools/validate_schemas.py --require-jsonschema

      - name: Import policy (stdlib-only, no runtime network)
        run: python tools/check_imports.py

      - name: Markdown link check
        run: python tools/check_links.py

      - name: Plugin vendor sync
        run: python tools/check_plugin_sync.py

      - name: Benchmark corpus integrity
        run: python benchmarks/run.py validate

      - name: Tests
        run: pytest
